<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic Studio Receipt</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: monospace;
    background: #d6d6d6;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px 16px;
    min-height: 100vh;
}

.card {
    width: 100%;
    max-width: 680px;
    background: #f5f5f5;
    border: 1px solid #bbb;
    border-radius: 4px;
    overflow: hidden;
}

.section {
    padding: 16px 18px;
    border-bottom: 2px solid #bbb;
}
.section:last-child { border-bottom: none; }

.section-title {
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #777;
    margin-bottom: 12px;
}

.field {
    display: flex;
    flex-direction: column;
    margin-bottom: 10px;
}
.field:last-child { margin-bottom: 0; }

.field label {
    font-size: 12px;
    color: #666;
    margin-bottom: 4px;
    letter-spacing: 0.5px;
}

.field input {
    width: 100%;
    padding: 9px 11px;
    border: 1px solid #ccc;
    background: white;
    font-family: monospace;
    font-size: 15px;
    outline: none;
}
.field input:focus { border-color: #555; }

/* Product table header */
.col-header {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid #ccc;
}
.col-header span {
    font-size: 12px;
    color: #888;
    font-weight: bold;
    letter-spacing: 0.5px;
    text-transform: uppercase;
}
.col-header .h-name  { flex: 2.2; }
.col-header .h-qty   { flex: 0.7; text-align: center; }
.col-header .h-price { flex: 1.1; text-align: right; }
.col-header .h-del   { width: 36px; }

/* Product input rows */
.product-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
}
.product-row input {
    padding: 9px 10px;
    border: 1px solid #ccc;
    background: white;
    font-family: monospace;
    font-size: 14px;
    outline: none;
    width: 100%;
}
.product-row input:focus { border-color: #555; }
.product-row .p-name  { flex: 2.2; }
.product-row .p-qty   { flex: 0.7; text-align: center; }
.product-row .p-price { flex: 1.1; text-align: right; }

.remove-btn {
    width: 36px;
    height: 38px;
    background: #cc0000;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.remove-btn:hover { background: #990000; }

.add-btn {
    width: 100%;
    padding: 10px;
    background: #444;
    color: white;
    border: none;
    cursor: pointer;
    font-family: monospace;
    font-size: 14px;
    letter-spacing: 0.5px;
    margin-top: 2px;
}
.add-btn:hover { background: #222; }

/* Action buttons */
.btn-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}
.btn-full { grid-column: 1 / -1; }

.action-btn {
    width: 100%;
    padding: 13px;
    border: none;
    cursor: pointer;
    font-family: monospace;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 0.5px;
}
.btn-dark  { background: #111; color: white; }
.btn-dark:hover { background: #333; }
.btn-green { background: #128c3e; color: white; }
.btn-green:hover { background: #0e6f31; }

/* Receipt */
#receipt {
    background: white;
    padding: 20px 24px;
    font-size: 15px;
    border-top: 2px solid #bbb;
}

.r-center { text-align: center; }
.r-bold   { font-weight: bold; }

.logo { width: 96px; margin-bottom: 8px; }

.r-divider {
    border: none;
    border-top: 1px dashed #000;
    margin: 11px 0;
}

.r-row {
    display: flex;
    justify-content: space-between;
    margin: 4px 0;
    font-size: 14px;
}

.r-item-header {
    display: flex;
    font-size: 12px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding-bottom: 5px;
    border-bottom: 1px solid #ddd;
    margin-bottom: 5px;
}
.r-item-header .rh-name { flex: 2; }
.r-item-header .rh-qty  { flex: 0.6; text-align: center; }
.r-item-header .rh-amt  { flex: 1; text-align: right; }

.r-product-row { display: flex; font-size: 14px; margin: 4px 0; }
.r-product-row .r-name { flex: 2; }
.r-product-row .r-qty  { flex: 0.6; text-align: center; color: #555; }
.r-product-row .r-amt  { flex: 1; text-align: right; }

.r-total-row {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    margin: 4px 0;
}
.r-total-row.pending {
    font-weight: bold;
    font-size: 15px;
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid #000;
}

/* Small phones */
@media (max-width: 400px) {
    body { padding: 12px 8px; }
    .section { padding: 12px 12px; }
    .field input { font-size: 14px; }
    .product-row input { font-size: 13px; }
}

</style>
</head>
<body>

<div class="card">

    <!-- CUSTOMER INFO -->
    <div class="section">
        <div class="section-title">Customer Info</div>
        <div class="field">
            <label>Amount Paid (₹)</label>
            <input type="number" id="paid" placeholder="0" oninput="updateReceipt()">
        </div>
        <div class="field">
            <label>Discount (₹)</label>
            <input type="number" id="discount" placeholder="0 (optional)" oninput="updateReceipt()">
        </div>
        <div class="field">
            <label>WhatsApp Number</label>
            <input type="number" id="phone" placeholder="98xxxxxxxx">
        </div>
    </div>

    <!-- PRODUCTS -->
    <div class="section">
        <div class="section-title">Products / Services</div>
        <div class="col-header">
            <span class="h-name">Item Name</span>
            <span class="h-qty">Qty</span>
            <span class="h-price">Price ₹</span>
            <span class="h-del"></span>
        </div>
        <div id="productRows"></div>
        <button class="add-btn" onclick="addProduct()">＋ Add Product / Service</button>
    </div>

    <!-- ACTIONS -->
    <div class="section">
        <div class="section-title">Actions</div>
        <div class="btn-group">
            <button class="action-btn btn-dark" onclick="copyImage()">📋 Copy JPG</button>
            <button class="action-btn btn-dark" onclick="downloadImage()">💾 Save JPG</button>
            <button class="action-btn btn-green btn-full" onclick="sendWhatsApp()">📲 Send via WhatsApp</button>
        </div>
    </div>

    <!-- RECEIPT PREVIEW -->
    <div id="receipt">

        <div class="r-center">
            <img id="logo"
                src="https://image2url.com/r2/default/images/1773827734093-cfea9993-0486-46c7-bb42-f553bdacdd61.png"
                crossorigin="anonymous" class="logo">
        </div>

        <div class="r-center r-bold" style="font-size:17px;letter-spacing:1px;">MAGIC STUDIO</div>
        <div class="r-center" style="font-size:13px;margin-top:5px;line-height:1.8;">
            Shop No.9, Hareshwar Niwas,<br>
            Eksar Rd, Borivali (W), Mumbai<br>
            📞 96533 17228
        </div>

        <hr class="r-divider">

        <div class="r-row"><span>Date</span><span id="date"></span></div>
        <div class="r-row"><span>Time</span><span id="time"></span></div>

        <hr class="r-divider">

        <div class="r-item-header">
            <span class="rh-name">Item</span>
            <span class="rh-qty">Qty</span>
            <span class="rh-amt">Amount</span>
        </div>
        <div id="r_products"></div>

        <hr class="r-divider">

        <div class="r-total-row"><span>Total Amount</span><span>₹ <span id="r_total">0</span></span></div>
        <div class="r-total-row" id="r_discount_row" style="display:none;"><span>Discount</span><span>− ₹ <span id="r_discount">0</span></span></div>
        <div class="r-total-row"><span>Amount Paid</span><span>₹ <span id="r_paid">0</span></span></div>
        <div class="r-total-row pending"><span>Amount Pending</span><span>₹ <span id="r_pending">0</span></span></div>

        <hr class="r-divider">

        <div class="r-center" style="font-size:13px;">If it stands out, it's Magic Studio.</div>

    </div>

</div>

<script>

function updateTime() {
    let now = new Date();
    document.getElementById("date").innerText = now.toLocaleDateString('en-IN');
    document.getElementById("time").innerText = now.toLocaleTimeString('en-IN');
}
setInterval(updateTime, 1000);
updateTime();

let products = [];

function addProduct() {
    products.push({ id: Date.now(), name: '', qty: 1, price: 0 });
    renderProductRows();
    updateReceipt();
}

function removeProduct(id) {
    products = products.filter(p => p.id !== id);
    renderProductRows();
    updateReceipt();
}

function renderProductRows() {
    let container = document.getElementById("productRows");
    container.innerHTML = '';
    products.forEach((p, i) => {
        let row = document.createElement('div');
        row.className = 'product-row';
        row.innerHTML = `
            <input class="p-name" type="text" placeholder="Item name" value="${p.name}"
                oninput="products[${i}].name=this.value; updateReceipt()">
            <input class="p-qty" type="number" min="1" placeholder="1" value="${p.qty}"
                oninput="products[${i}].qty=parseFloat(this.value)||0; updateReceipt()">
            <input class="p-price" type="number" placeholder="0" value="${p.price || ''}"
                oninput="products[${i}].price=parseFloat(this.value)||0; updateReceipt()">
            <button class="remove-btn" onclick="removeProduct(${p.id})">✕</button>
        `;
        container.appendChild(row);
    });
}

function updateReceipt() {
    let paid = parseFloat(document.getElementById("paid").value) || 0;
    let discount = parseFloat(document.getElementById("discount").value) || 0;
    let rProducts = document.getElementById("r_products");
    rProducts.innerHTML = '';
    let total = 0;

    products.forEach(p => {
        if (!p.name && !p.price) return;
        let amt = (p.qty || 1) * (p.price || 0);
        total += amt;
        let row = document.createElement('div');
        row.className = 'r-product-row';
        row.innerHTML = `
            <span class="r-name">${p.name || '—'}</span>
            <span class="r-qty">×${p.qty || 1}</span>
            <span class="r-amt">₹${amt}</span>
        `;
        rProducts.appendChild(row);
    });

    let finalTotal = total - discount;

    document.getElementById("r_total").innerText = total;
    document.getElementById("r_paid").innerText = paid;
    document.getElementById("r_pending").innerText = finalTotal - paid;

    const discountRow = document.getElementById("r_discount_row");
    if (discount > 0) {
        document.getElementById("r_discount").innerText = discount;
        discountRow.style.display = 'flex';
    } else {
        discountRow.style.display = 'none';
    }
}

addProduct();

function waitForImages(cb) {
    const img = document.getElementById("logo");
    img.complete ? cb() : (img.onload = cb);
}

function getCanvas() {
    return html2canvas(document.getElementById("receipt"), {
        useCORS: true,
        scale: 2,
        backgroundColor: '#ffffff'
    });
}

function copyImage() {
    waitForImages(() => {
        getCanvas().then(canvas => {
            canvas.toBlob(blob => {
                navigator.clipboard.write([new ClipboardItem({ "image/png": blob })])
                    .then(() => alert("Copied ✅"))
                    .catch(() => alert("Clipboard blocked ❌ Use Save JPG"));
            });
        });
    });
}

function downloadImage() {
    waitForImages(() => {
        getCanvas().then(canvas => {
            let link = document.createElement("a");
            link.download = "receipt.jpg";
            link.href = canvas.toDataURL("image/jpeg", 1.0);
            link.click();
        });
    });
}

function sendWhatsApp() {
    let phone = document.getElementById("phone").value;
    if (!phone) { alert("Enter WhatsApp number"); return; }
    if (!phone.startsWith("91")) phone = "91" + phone;
    waitForImages(() => {
        getCanvas().then(canvas => {
            canvas.toBlob(blob => {
                navigator.clipboard.write([new ClipboardItem({ "image/png": blob })])
                    .then(() => {
                        window.open("https://wa.me/" + phone, "_blank");
                        alert("Copied ✅ Paste in WhatsApp");
                    });
            });
        });
    });
}

</script>
</body>
</html>
